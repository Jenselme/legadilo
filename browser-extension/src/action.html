<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Legadilo</title>
        <link rel="stylesheet" type="text/css" href="./vendor/bootstrap.css" />
        <link rel="stylesheet" type="text/css" href="./action.css" />
        <script src="./vendor/bootstrap.js"></script>
        <script src="./theme_chooser.js"></script>
    </head>
    <body>
        <div id="loading-indicator-container" hidden>
            <div id="loading-indicator"
                 class="d-flex align-items-center justify-content-center">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
        <div id="action-selector-container" hidden>
            <div id="choose-action-container" class="row row-cols-1 m-auto">
                <button id="save-article-action-btn"
                        class="btn btn-primary mb-2 col"
                        type="button">
                    Save this article
                    <span id="article-already-saved" hidden>
                        <svg class="bi"
                             role="img"
                             aria-label="Article already saved">
                            <use href="./bs-sprite.svg#save-fill"></use>
                        </svg>
                    </span>
                </button>
            </div>
            <div id="subscribe-to-feeds-container" class="row row-cols-1 m-auto"></div>
        </div>
        <div id="article-container" hidden>
            <button id="article-nav-back"
                    class="btn btn-outline-secondary btn-sm"
                    type="button">
                <svg class="bi" role="img" aria-label="Go back button">
                    <use href="./bs-sprite.svg#arrow-left"></use>
                </svg>
                Back
            </button>
            <form id="update-saved-article-form">
                <div class="mb-3">
                    <label for="saved-article-title" class="form-label">
                        Article title <span>*</span>
                    </label>
                    <input id="saved-article-title"
                           name="title"
                           class="form-control"
                           type="text" />
                </div>
                <div class="mb-3">
                    <label for="saved-article-reading-time" class="form-label">
                        Reading time
                        <span>*</span>
                    </label>
                    <input id="saved-article-reading-time"
                           name="reading-time"
                           class="form-control"
                           type="number"
                           step="1" />
                </div>
                <div class="mb-3">
                    <label for="saved-article-group" class="form-label">Group</label>
                    <select id="saved-article-group" name="group" class="form-select" data-allow-new="true">
                        <option hidden value="">Choose a group...</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="saved-article-tags" class="form-label">Tags</label>
                    <select id="saved-article-tags"
                            name="tags"
                            class="form-select"
                            multiple>
                        <option disabled hidden value="">Choose a tag...</option>
                    </select>
                </div>
                <div class="mb-3 d-flex justify-content-around">
                    <button id="update-saved-article"
                            class="btn btn-primary btn-sm"
                            type="submit">Update</button>
                    <button class="btn btn-danger btn-sm"
                        type="button"
                        id="delete-article">
                        <svg class="bi" role="img" aria-label="Delete article">
                            <use href="./bs-sprite.svg#trash"></use>
                        </svg>
                        Delete
                    </button>
                </div>
            </form>
            <div class="mb-3 d-flex justify-content-evenly">
                <button class="btn btn-outline-secondary btn-sm"
                        type="button"
                        id="mark-article-as-favorite">
                    <svg class="bi" role="img" aria-label="Mark as favorite">
                        <use href="./bs-sprite.svg#star"></use>
                    </svg>
                </button>
                <button class="btn btn-outline-secondary btn-sm"
                        type="button"
                        id="unmark-article-as-favorite">
                    <svg class="bi" role="img" aria-label="Unmark as favorite">
                        <use href="./bs-sprite.svg#star-fill"></use>
                    </svg>
                </button>
                <button class="btn btn-outline-secondary btn-sm"
                        type="button"
                        id="mark-article-as-for-later">
                    <svg class="bi" role="img" aria-label="Mark as for later">
                        <use href="./bs-sprite.svg#bookmark"></use>
                    </svg>
                </button>
                <button class="btn btn-outline-secondary btn-sm"
                        type="button"
                        id="unmark-article-as-for-later">
                    <svg class="bi" role="img" aria-label="Unmark as for later">
                        <use href="./bs-sprite.svg#bookmark-fill"></use>
                    </svg>
                </button>
                 <a id="open-article-details"
                   class="btn btn-outline-secondary btn-sm"
                   role="button"
                   target="_blank"
                   href="">
                    <svg class="bi" role="img" aria-label="Open article details">
                        <use href="./bs-sprite.svg#eye"></use>
                    </svg>
                </a>
                <a id="open-group-details"
                   class="btn btn-outline-secondary btn-sm"
                   role="button"
                   target="_blank"
                   href=""
                   hidden>
                    <svg class="bi" role="img" aria-label="Open group details">
                        <use href="./bs-sprite.svg#collection"></use>
                    </svg>
                </a>
                <button class="btn btn-outline-secondary btn-sm"
                        type="button"
                        id="mark-article-as-read">
                    <svg class="bi" role="img" aria-label="Mark as read">
                        <use href="./bs-sprite.svg#book"></use>
                    </svg>
                </button>
                <button class="btn btn-outline-secondary btn-sm"
                        type="button"
                        id="mark-article-as-unread">
                    <svg class="bi" role="img" aria-label="Mark as unread">
                        <use href="./bs-sprite.svg#book-fill"></use>
                    </svg>
                </button>
            </div>
        </div>
        <div id="feed-container" hidden>
            <button id="feed-nav-back"
                    class="btn btn-outline-secondary btn-sm"
                    type="button">
                <svg class="bi" role="img" aria-label="Go back button">
                    <use href="./bs-sprite.svg#arrow-left"></use>
                </svg>
                Back
            </button>
            <h2 id="feed-title"></h2>
            <form id="update-feed-form">
                <div class="mb-3">
                    <label for="feed-category" class="form-label">Category</label>
                    <select id="feed-category" name="category" class="form-select" data-allow-new="false">
                        <option hidden value="">Choose a category...</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="feed-refresh-delay" class="form-label">Refresh delay</label>
                    <select id="feed-refresh-delay" name="refresh-delay" class="form-select">
                        <option value="HOURLY">Hourly</option>
                        <option value="BIHOURLY">Bihourly</option>
                        <option value="EVERY_MORNING">Every Morning</option>
                        <option value="DAILY_AT_NOON">Daily at Noon</option>
                        <option value="EVERY_EVENING">Every Evening</option>
                        <option value="ON_MONDAYS">On Mondays</option>
                        <option value="ON_THURSDAYS">On Thursdays</option>
                        <option value="ON_SATURDAYS">On Saturdays</option>
                        <option value="ON_SUNDAYS">On Sundays</option>
                        <option value="TWICE_A_WEEK">Twice a week</option>
                        <option value="FIRST_DAY_OF_THE_MONTH">First Day of the Month</option>
                        <option value="MIDDLE_OF_THE_MONTH">Middle Day of the Month</option>
                        <option value="END_OF_THE_MONTH">End of the Month</option>
                        <option value="THRICE_A_MONTH">Thrice a month</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="feed-article-retention-time" class="form-label">Article retention period in days (0 for infinity)</label>
                    <input id="feed-article-retention-time"
                           name="retention-time"
                           class="form-control"
                           type="number"
                           step="1" />
                </div>
                <div class="mb-3">
                    <label for="feed-tags" class="form-label">Tags</label>
                    <select id="feed-tags"
                            name="tags"
                            class="form-select"
                            multiple>
                        <option disabled hidden value="">Choose a tag...</option>
                    </select>
                </div>
                <div class="mb-3 d-flex justify-content-around">
                    <button id="update-feed" class="btn btn-primary btn-sm" type="submit">Update</button>
                    <button class="btn btn-outline-danger btn-sm" type="button" id="delete-feed">
                        <svg class="bi" role="img" aria-label="Delete feed">
                            <use href="./bs-sprite.svg#trash"></use>
                        </svg>
                        Delete
                    </button>
                </div>
            </form>
            <div class="mb-3 d-flex justify-content-evenly">
                <button id="enable-feed"
                        class="btn btn-outline-secondary btn-sm"
                        type="button">Enable</button>
                <button id="disable-feed"
                        class="btn btn-outline-secondary btn-sm"
                        type="button">Disable</button>
                <a id="open-feed-details"
                   class="btn btn-outline-secondary btn-sm"
                   role="button"
                   target="_blank"
                   href="">
                    <svg class="bi" role="img" aria-label="Open feed">
                        <use href="./bs-sprite.svg#eye"></use>
                    </svg>
                </a>
            </div>
        </div>
        <div id="error-container" class="alert alert-danger" hidden>
            <button id="error-nav-back"
                    class="btn btn-outline-secondary btn-sm"
                    type="button">
                <svg class="bi" role="img" aria-label="Go back button">
                    <use href="./bs-sprite.svg#arrow-left"></use>
                </svg>
                Back
            </button>
            <p>An error occurred</p>
            <pre id="error-message"></pre>
        </div>
        <dialog id="confirm-dialog">
            <div class="modal-header">
                <h2 id="confirm-dialog-title" class="modal-title">Do you confirm?</h2>
            </div>
            <button id="confirm-dialog-cancel-btn"
                    class="btn btn-outline-secondary"
                    type="button">No</button>
            <button id="confirm-dialog-confirm-btn" class="btn btn-danger" type="button">Yes</button>
        </dialog>
        <script src="action.js" type="module"></script>
    </body>
</html>
